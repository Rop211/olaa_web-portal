{% extends 'base.html' %}

{% block title %}Add Staff{% endblock %}

{% block content %}

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="fas fa-user-plus text-success me-2"></i>Add New Staff</h2>
        <a href="{{ url_for('admin_staff') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-1"></i>Back
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">First Name <span class="text-danger">*</span></label>
                                <input type="text" name="first_name" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Last Name <span class="text-danger">*</span></label>
                                <input type="text" name="last_name" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Email</label>
                                <input type="email" name="email" class="form-control" placeholder="staff@email.com">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Phone</label>
                                <input type="text" name="phone" class="form-control" placeholder="+254 7XX XXX XXX">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Position <span class="text-danger">*</span></label>
                                <input type="text" name="position" class="form-control" placeholder="e.g. Teacher" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Department</label>
                                <input type="text" name="department" class="form-control" placeholder="e.g. Science">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Experience (Years)</label>
                                <input type="number" name="experience_years" class="form-control" value="0">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Hire Date</label>
                                <input type="date" name="hire_date" class="form-control">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold">Qualifications</label>
                                <textarea name="qualifications" class="form-control" rows="2" placeholder="e.g. B.Ed, TSC Certified"></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold">Bio</label>
                                <textarea name="bio" class="form-control" rows="3" placeholder="Brief biography..."></textarea>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-success btn-lg w-100 py-3">
                                    <i class="fas fa-save me-2"></i>Create Staff
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

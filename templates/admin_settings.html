{% extends 'base.html' %}

{% block title %}Settings - Admin{% endblock %}

{% block content %}

<div class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="fas fa-cog text-secondary me-2"></i>School Settings</h2>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-1"></i>Back
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form method="POST" action="{{ url_for('admin_update_settings') }}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">School Name</label>
                        <input type="text" name="setting_school_name" class="form-control" value="{{ settings_dict.get('school_name', '') }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">School Tagline</label>
                        <input type="text" name="setting_school_tagline" class="form-control" value="{{ settings_dict.get('school_tagline', '') }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Address</label>
                        <input type="text" name="setting_school_address" class="form-control" value="{{ settings_dict.get('school_address', '') }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Phone</label>
                        <input type="text" name="setting_school_phone" class="form-control" value="{{ settings_dict.get('school_phone', '') }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" name="setting_school_email" class="form-control" value="{{ settings_dict.get('school_email', '') }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Facebook URL</label>
                        <input type="url" name="setting_school_facebook" class="form-control" value="{{ settings_dict.get('school_facebook', '') }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Twitter URL</label>
                        <input type="url" name="setting_school_twitter" class="form-control" value="{{ settings_dict.get('school_twitter', '') }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Instagram URL</label>
                        <input type="url" name="setting_school_instagram" class="form-control" value="{{ settings_dict.get('school_instagram', '') }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">YouTube URL</label>
                        <input type="url" name="setting_school_youtube" class="form-control" value="{{ settings_dict.get('school_youtube', '') }}">
                    </div>
                    <div class="col-md-12">
                        <label class="form-label fw-bold">Mission Statement</label>
                        <textarea name="setting_school_mission" class="form-control" rows="2">{{ settings_dict.get('school_mission', '') }}</textarea>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label fw-bold">Vision Statement</label>
                        <textarea name="setting_school_vision" class="form-control" rows="2">{{ settings_dict.get('school_vision', '') }}</textarea>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label fw-bold">Values</label>
                        <textarea name="setting_school_values" class="form-control" rows="2">{{ settings_dict.get('school_values', '') }}</textarea>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary btn-lg w-100 py-3">
                            <i class="fas fa-save me-2"></i>Save Settings
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
